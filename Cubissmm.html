<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>초_절정귀요미천사짱.exe</title>

<style>
* {
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

img, video {
  -webkit-user-drag: none;
  pointer-events: none;
}

body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: black;
}

/* 🌸 배경 */
.bg {
  position: fixed;
  inset: 0;
  z-index: -2;

  background-color: #ffd6ec;
  background-image:
    linear-gradient(45deg, #ffb6d9 25%, transparent 25%),
    linear-gradient(-45deg, #ffb6d9 25%, transparent 25%);
  background-size: 40px 40px;

  transition: filter 1s ease;
}

.bg.dark {
  filter: brightness(0.4);
}

.bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background: url('https://met-lu.vercel.app/842f06f2ee3222050b256152ecba7a18.jpg') center/cover;
  opacity: 0;
  transition: opacity 1s ease;
}

.bg.dark::after {
  opacity: 0.75;
}

/* 💬 채팅 */
#chatLayer {
  position: fixed;
  inset: 0;
  z-index: 50;
  pointer-events: none;
  overflow: hidden;
  display: none;
}

.comment {
  position: absolute;
  white-space: nowrap;
  color: white;
  font-family: "MS PGothic", sans-serif;
  font-size: 24px;
  text-shadow: 0 0 5px black, 1px 1px 0 black;
  animation: move 6s linear forwards;
}

@keyframes move {
  from { transform: translateX(110vw); }
  to { transform: translateX(-120vw); }
}

/* 🪟 UI */
.wrapper {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 12px;
  box-sizing: border-box;
}

.window {
  width: 900px;
  max-width: 100%;
  background: #d9d9d9;
  border: 3px solid white;
  box-shadow: 0 0 0 2px black, 6px 6px 0 black;
}

/* 타이틀 */
.titlebar {
  background: linear-gradient(#ff69b4, #ff1493);
  color: white;
  font-size: 16px;
  padding: 6px 10px;
  font-family: "MS PGothic";
  display: flex;
  justify-content: space-between;
}

/* 내용 */
.content {
  padding: 12px;
  text-align: center;
}

.title {
  color: white;
  font-size: 20px;
  font-family: "MS PGothic";
  text-shadow: 0 0 5px white, 1px 1px 0 black;
}

/* GIF */
.pet-gif {
  width: 230px;
  transition: 0.6s;
}

.pet-gif.active {
  filter: saturate(3) brightness(1.4);
}

/* 플레이어 */
.player {
  width: 100%;
  aspect-ratio: 16/9;
  background: black;
  position: relative;
  border: 2px inset white;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 썸네일 */
.overlay {
  position: absolute;
  inset: 0;
  background: url('https://met-lu.vercel.app/hXWvr559Yxo3EKWV7kVruCsgNCraF9s4GwgfMwFaJDlCsG9p03TL1S2fA9sjgA682oWrflQJgqbHIs9PUNlRpBag563guQW28CL725YBAXet-Q6QsI7xIvUNd1GVjEaaVJE4ORtuuPxOAiScilUtVg.webp') center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
}

.play {
  background: white;
  padding: 8px 12px;
  border: 1px solid black;
}

/* 📱 모바일 */
@media (max-width: 600px) {
  .comment { font-size: 26px; }
  .window { transform: scale(1.15); }
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div id="chatLayer"></div>

<div class="wrapper" id="ui">
<div class="window">

  <div class="titlebar">
    <span>超_絶頂級귀요미천사짱.exe</span>
    <span>× □</span>
  </div>

  <div class="content">

    <div class="title">超絶最かわてんしちゃん♡</div>

    <img src="https://met-lu.vercel.app/icon_7.gif" class="pet-gif" id="gif">

    <div class="player">
      <video id="video"
        src="https://met-lu.vercel.app/lv_0_20260424073954.mp4">
      </video>

      <div class="overlay" id="overlay">
        <div class="play">▶ 再生</div>
      </div>
    </div>

  </div>
</div>
</div>

<script>
const video = document.getElementById("video");
const overlay = document.getElementById("overlay");
const bg = document.getElementById("bg");
const gif = document.getElementById("gif");
const chatLayer = document.getElementById("chatLayer");
const ui = document.getElementById("ui");

let started = false;
let ended = false;

/* 💬 전체 채팅 */
const positive = [
"かわいいwww","ダイスキww","がんばれ!","私たちの天使!!","うわっ!",
"最高すぎる","癒される","尊い…","神か？","泣いた",
"エモい","優勝","神動画","ずっと見てたい","ありがとう世界",
"生きててよかった","推し確定","尊死した","天使すぎる","センス爆発"
];
const negative = [
"お前の存在そのものがこの空間を壊している。見ていて不快とかいうレベルじゃない。",
"何を表現したいのか全く伝わらないし、自己満足にしか見えないのが本当にきつい。",
"これを面白いと思って公開している時点で感覚がズレすぎている。",
"正直、途中から見ていて精神的に削られる感じがした。",
"意味がわからないまま終わってしまった。何も残らない。",
"ニコニコ風なのに当時の良さが一切感じられないのが逆にすごい。",
"見ていて疲れるタイプの映像。長時間は無理。",
"これを完成品として出しているのが一番怖い。",
"感情がぐちゃぐちゃになるだけで楽しくはない。",
"お願いだからもう少し整理してほしい。"
];
const endingChat = [
"え？終わった…？",
"今のなに…？",
"ちょっと待って無理",
"え、消えた？？",
"やだやだやだやだ",
"どこいったの…",
"ねぇ戻ってきて",
"こわいこわいこわい",
"泣きそうなんだけど",
"え、これ夢？",
"うそでしょ…",
"なんで…",
"置いてかないで…",
"お願い…戻して…",
"今の何だったの…"
];

/* 💬 생성 */
function spawn(list, forceAll=false){
  const c = document.createElement("div");
  c.className = "comment";
  c.innerText = list[Math.floor(Math.random()*list.length)];

  let top;

  // 🔥 엔딩일 때는 팝업 회피 X
  if(forceAll){
    top = Math.random()*100;
  } else {
    do {
      top = Math.random()*100;
    } while(top>30 && top<75);
  }

  c.style.top = top + "%";

  chatLayer.appendChild(c);
  setTimeout(()=>c.remove(),6000);
}

/* ▶ 시작 */
function startChat(){
  if(started) return;
  started = true;

  chatLayer.style.display = "block";

  setInterval(()=>{
    const t = video.currentTime;

    if(ended){
      spawn(endingChat, true); // 💥 전체 화면 도배
    }
    else if(t>=12 && t<=22){
      spawn(negative);
    }
    else{
      spawn(positive);
    }
  },140);
}

/* ▶ 재생 */
overlay.onclick = ()=>{
  overlay.style.display="none";
  video.play();
  startChat();
};

/* 🌑 상태 */
video.addEventListener("timeupdate",()=>{
  const t = video.currentTime;

  if(t>=12 && t<=22){
    bg.classList.add("dark");
    gif.classList.add("active");
  } else {
    bg.classList.remove("dark");
    gif.classList.remove("active");
  }
});

/* 💀 엔딩 */
video.addEventListener("ended",()=>{
  ended = true;

  bg.classList.add("dark");

  ui.style.display = "none";   // 🪟 팝업 제거
  chatLayer.style.display = "block"; // 💬 채팅만 남김
});

document.addEventListener("contextmenu",e=>e.preventDefault());
</script>

</body>
</html>
