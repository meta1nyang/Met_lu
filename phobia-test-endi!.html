<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phobia Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300&family=Noto+Sans+JP:wght@100;200;300&family=Noto+Sans+KR:wght@100;200;300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fff;
    --fg: #000;
    --muted: #888;
    --border: #e0e0e0;
    --hover-bg: #f4f4f4;
    --active-bg: #000;
    --active-fg: #fff;
    --bar-bg: #e8e8e8;
    --bar-fill: #000;
    --shadow: rgba(0,0,0,0.07);
    --font-main: 'Inter', 'Noto Sans KR', 'Noto Sans JP', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-main);
    font-weight: 200;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .lang-bar {
    width: 100%;
    display: flex;
    justify-content: flex-end;
    padding: 1.2rem 2.5rem 0;
    gap: 1.2rem;
  }

  .lang-btn {
    background: none;
    border: none;
    font-family: var(--font-main);
    font-weight: 200;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.2s;
    padding: 0;
    text-transform: uppercase;
  }
  .lang-btn.active, .lang-btn:hover { color: var(--fg); }
  .lang-btn.active { font-weight: 300; }

  .container {
    width: 100%;
    max-width: 640px;
    padding: 3.5rem 2rem 5rem;
  }

  .header {
    text-align: center;
    margin-bottom: 4rem;
  }

  .subtitle {
    font-size: 0.68rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1.2rem;
    font-weight: 200;
  }

  h1 {
    font-size: 2.4rem;
    font-weight: 100;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 1rem;
  }

  .desc {
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 200;
    letter-spacing: 0.04em;
    line-height: 1.8;
  }

  .progress-wrap {
    margin-bottom: 3rem;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 0.6rem;
    font-weight: 200;
    text-transform: uppercase;
  }

  .progress-bar {
    width: 100%;
    height: 1px;
    background: var(--bar-bg);
    position: relative;
  }

  .progress-fill {
    height: 1px;
    background: var(--bar-fill);
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .question-block {
    margin-bottom: 2.5rem;
  }

  .q-num {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-bottom: 0.8rem;
    font-weight: 200;
    text-transform: uppercase;
  }

  .q-text {
    font-size: 1.08rem;
    font-weight: 200;
    letter-spacing: 0.01em;
    line-height: 1.65;
    margin-bottom: 1.4rem;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
  }

  .option-btn {
    background: none;
    border: 1px solid var(--border);
    font-family: var(--font-main);
    font-weight: 200;
    font-size: 0.82rem;
    letter-spacing: 0.04em;
    color: var(--fg);
    cursor: pointer;
    padding: 0.9rem 1.2rem;
    text-align: left;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    gap: 0.9rem;
    line-height: 1.5;
  }

  .option-btn .opt-label {
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    flex-shrink: 0;
    font-weight: 200;
    min-width: 18px;
  }

  .option-btn:hover {
    background: var(--hover-bg);
    border-color: #bbb;
  }

  .option-btn.selected {
    background: var(--active-bg);
    border-color: var(--active-bg);
    color: var(--active-fg);
  }

  .option-btn.selected .opt-label { color: #888; }

  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 2rem;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    font-family: var(--font-main);
    font-weight: 200;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: var(--fg);
    cursor: pointer;
    padding: 0.7rem 1.6rem;
    text-transform: uppercase;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }

  .nav-btn:hover { background: var(--hover-bg); }

  .nav-btn.primary {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  .nav-btn.primary:hover { opacity: 0.8; }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }

  .result-header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .result-header .subtitle { margin-bottom: 1rem; }

  .result-score {
    font-size: 5rem;
    font-weight: 100;
    letter-spacing: -0.04em;
    line-height: 1;
    margin-bottom: 0.4rem;
  }

  .result-level {
    font-size: 1rem;
    font-weight: 200;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .result-desc {
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 200;
    line-height: 1.8;
    max-width: 420px;
    margin: 0 auto;
  }

  .result-bars {
    margin: 2.5rem 0 3rem;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.1rem;
  }

  .bar-label {
    font-size: 0.7rem;
    font-weight: 200;
    letter-spacing: 0.08em;
    color: var(--muted);
    width: 130px;
    flex-shrink: 0;
    line-height: 1.3;
    text-transform: uppercase;
  }

  .bar-track {
    flex: 1;
    height: 1px;
    background: var(--bar-bg);
    position: relative;
  }

  .bar-track-fill {
    height: 1px;
    background: var(--bar-fill);
    transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
  }

  .bar-pct {
    font-size: 0.68rem;
    font-weight: 200;
    color: var(--muted);
    width: 34px;
    text-align: right;
    letter-spacing: 0.05em;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 2rem 0;
  }

  .restart-btn {
    display: block;
    margin: 0 auto;
    background: none;
    border: 1px solid var(--border);
    font-family: var(--font-main);
    font-weight: 200;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    cursor: pointer;
    padding: 0.75rem 2rem;
    text-transform: uppercase;
    transition: border-color 0.15s, color 0.15s;
  }

  .restart-btn:hover { border-color: #999; color: var(--fg); }

  .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4,0,0.2,1); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  .screen { display: none; opacity: 0; }
  .screen.active { display: block; animation: screenIn 0.55s cubic-bezier(0.4,0,0.2,1) forwards; }
  @keyframes screenIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

  .bar-track-fill {
    transition: width 0.9s cubic-bezier(0.4,0,0.2,1) !important;
  }

  .bar-row { transition: opacity 0.4s ease; }
  .bar-row.top-phobia .bar-label { color: var(--fg); font-weight: 300; }
  .bar-row.top-phobia .bar-pct { color: var(--fg); font-weight: 300; }
  .bar-row.top-phobia .bar-track-fill { background: var(--fg); height: 2px; margin-top: -0.5px; }
  .bar-row.top-phobia .bar-track { height: 2px; }

  .top-badge {
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    color: var(--fg);
    text-transform: uppercase;
    border: 1px solid var(--fg);
    padding: 0.15rem 0.5rem;
    margin-left: 0.6rem;
    font-weight: 200;
    vertical-align: middle;
    display: inline-block;
    animation: badgeIn 0.5s 0.7s cubic-bezier(0.4,0,0.2,1) both;
  }
  @keyframes badgeIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: none; } }

  .dominant-block {
    margin: 0 0 2.5rem;
    padding: 1.4rem 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    animation: screenIn 0.55s 0.2s cubic-bezier(0.4,0,0.2,1) both;
  }
  .dominant-label {
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 200;
    margin-bottom: 0.55rem;
  }
  .dominant-name {
    font-size: 1.5rem;
    font-weight: 100;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  .disclaimer {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    font-weight: 200;
    text-align: center;
    line-height: 1.7;
    margin-top: 2rem;
  }

</style>
</head>
<body>

<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('en')">EN</button>
  <button class="lang-btn" onclick="setLang('ko')">한국어</button>
  <button class="lang-btn" onclick="setLang('ja')">日本語</button>
</div>

<div class="container">

  <!-- INTRO SCREEN -->
  <div id="screen-intro" class="screen active">
    <div class="header">
      <p class="subtitle" data-i18n="intro.subtitle">Psychological Assessment</p>
      <h1 data-i18n="intro.title">Phobia<br>Test</h1>
      <p class="desc" data-i18n="intro.desc">Answer 20 questions honestly.<br>Your responses reveal hidden fears<br>and anxiety patterns.</p>
    </div>
    <button class="nav-btn primary" style="width:100%;text-align:center;padding:1rem;" onclick="startTest()" data-i18n="intro.start">Begin</button>
    <p class="disclaimer" style="margin-top:1.5rem" data-i18n="intro.disclaimer">Not a clinical diagnosis · For informational purposes only</p>
  </div>

  <!-- TEST SCREEN -->
  <div id="screen-test" class="screen">
    <div class="progress-wrap">
      <div class="progress-label">
        <span data-i18n="test.progress">Question</span>
        <span id="prog-num">1 / 20</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:5%"></div></div>
    </div>

    <div class="question-block fade-in" id="q-block">
      <div class="q-num" id="q-num">01</div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="q-options"></div>
    </div>

    <div class="nav-row">
      <button class="nav-btn" id="btn-prev" onclick="prevQ()" data-i18n="test.prev">Prev</button>
      <button class="nav-btn primary" id="btn-next" onclick="nextQ()" data-i18n="test.next">Next</button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="screen-result" class="screen">
    <div class="result-header">
      <p class="subtitle" data-i18n="result.subtitle">Your Results</p>
      <div class="result-score" id="res-score">0</div>
      <div class="result-level" id="res-level"></div>
      <p class="result-desc" id="res-desc"></p>
    </div>

    <div class="divider"></div>

    <div class="dominant-block" id="dominant-block"></div>

    <div class="result-bars" id="result-bars"></div>

    <div class="divider"></div>
    <button class="restart-btn" onclick="restart()" data-i18n="result.restart">Retake Test</button>
    <p class="disclaimer" style="margin-top:1.5rem" data-i18n="intro.disclaimer">Not a clinical diagnosis · For informational purposes only</p>
  </div>

</div>

let lang = 'en';
let answers = new Array(20).fill(null);
let current = 0;

function t(key) { return I18N[lang][key] || key; }

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  refreshI18n();
  const testActive = document.getElementById('screen-test').classList.contains('active');
  if (testActive) renderQuestion();
}

function refreshI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (key === 'intro.title') {
      el.innerHTML = t(key).replace('\n','<br>');
    } else {
      el.textContent = t(key);
    }
  });
}

function startTest() {
  playClick();
  answers = new Array(20).fill(null);
  current = 0;
  showScreen('test');
  renderQuestion();
  startMusic();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

let typingTimer = null;

function typeText(el, text, onDone) {
  if (typingTimer) { clearInterval(typingTimer); typingTimer = null; }
  el.textContent = '';
  let i = 0;
  typingTimer = setInterval(() => {
    if (i >= text.length) {
      clearInterval(typingTimer);
      typingTimer = null;
      if (onDone) onDone();
      return;
    }
    el.textContent += text[i];
    playTypeSound();
    i++;
  }, 28);
}

function renderQuestion(skipType) {
  const q = QUESTIONS[lang][current];
  const opts = t('options');
  const total = QUESTIONS[lang].length;
  const pct = Math.round(((current) / total) * 100);

  document.getElementById('prog-num').textContent = (current + 1) + ' / ' + total;
  document.getElementById('prog-fill').style.width = Math.max(pct, 3) + '%';
  document.getElementById('q-num').textContent = String(current + 1).padStart(2, '0');

  const qtext = document.getElementById('q-text');
  const optDiv = document.getElementById('q-options');
  optDiv.innerHTML = '';
  optDiv.style.opacity = '0';

  const renderOpts = () => {
    optDiv.innerHTML = '';
    opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn' + (answers[current] === i ? ' selected' : '');
      btn.innerHTML = `<span class="opt-label">${String.fromCharCode(65+i)}</span><span>${opt}</span>`;
      btn.onclick = () => { playClick(); answers[current] = i; renderQuestion(true); };
      optDiv.appendChild(btn);
    });
    optDiv.style.transition = 'opacity 0.3s ease';
    optDiv.style.opacity = '1';
  };

  const qBlock = document.getElementById('q-block');
  qBlock.classList.remove('fade-in');
  void qBlock.offsetWidth;
  qBlock.classList.add('fade-in');

  if (skipType) {
    qtext.textContent = q.text;
    renderOpts();
  } else {
    qtext.textContent = '';
    typeText(qtext, q.text, renderOpts);
  }

  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  btnPrev.disabled = current === 0;

  if (current === total - 1) {
    btnNext.textContent = t('test.finish');
    btnNext.setAttribute('data-i18n','test.finish');
  } else {
    btnNext.textContent = t('test.next');
    btnNext.setAttribute('data-i18n','test.next');
  }
}

function prevQ() {
  if (current > 0) { playClick(); current--; renderQuestion(); }
}

function nextQ() {
  const total = QUESTIONS[lang].length;
  if (answers[current] === null) {
    document.getElementById('q-text').style.color = '#c00';
    setTimeout(() => document.getElementById('q-text').style.color = '', 600);
    return;
  }
  playClick();
  if (current < total - 1) { current++; renderQuestion(); }
  else showResult();
}

function showResult() {
  const cats = [0,0,0,0,0,0];
  const counts = [0,0,0,0,0,0];
  QUESTIONS[lang].forEach((q, i) => {
    if (answers[i] !== null) {
      cats[q.cat] += answers[i];
      counts[q.cat]++;
    }
  });

  const pcts = cats.map((val, i) => Math.round((val / ((counts[i] || 1) * 4)) * 100));
  const topIdx = pcts.indexOf(Math.max(...pcts));

  const total = answers.reduce((a,b) => a + (b||0), 0);
  const maxTotal = 20 * 4;
  const pct = Math.round((total / maxTotal) * 100);
  const levels = t('result.levels');
  let level;
  if (pct < 15) level = levels[0];
  else if (pct < 30) level = levels[1];
  else if (pct < 50) level = levels[2];
  else if (pct < 70) level = levels[3];
  else level = levels[4];

  const descs = t('result.descs');
  let descFinal = descs[pct < 15 ? 0 : pct < 30 ? 1 : pct < 50 ? 2 : pct < 70 ? 3 : 4];

  document.getElementById('res-score').textContent = pct + '%';
  document.getElementById('res-level').textContent = level;
  document.getElementById('res-desc').textContent = descFinal;

  const catNames = t('result.categories');
  const dominantLabels = { en: 'Dominant fear', ko: '가장 강한 공포', ja: '最も強い恐怖' };
  document.getElementById('dominant-block').innerHTML =
    `<div class="dominant-label">${dominantLabels[lang]}</div>
     <div class="dominant-name">${catNames[topIdx]}</div>`;

  const barsDiv = document.getElementById('result-bars');
  barsDiv.innerHTML = '';
  pcts.forEach((p, i) => {
    const isTop = i === topIdx;
    barsDiv.innerHTML += `
      <div class="bar-row${isTop ? ' top-phobia' : ''}">
        <div class="bar-label">${catNames[i]}${isTop ? `<span class="top-badge">#1</span>` : ''}</div>
        <div class="bar-track"><div class="bar-track-fill" style="width:0%" id="bar-${i}"></div></div>
        <div class="bar-pct">${p}%</div>
      </div>`;
  });

  showScreen('result');
  setTimeout(() => {
    pcts.forEach((p, i) => {
      const el = document.getElementById('bar-' + i);
      if (el) el.style.width = p + '%';
    });
  }, 150);
}

function restart() {
  playClick();
  answers = new Array(20).fill(null);
  current = 0;
  stopMusic();
  showScreen('intro');
  refreshI18n();
}

/* ── SYNTH ENGINE ── */
let audioCtx = null;
let masterGain = null;
let musicPlaying = false;
let musicNodes = [];
let padTimeouts = [];

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  masterGain.connect(audioCtx.destination);
}

/* sfx: separate context so sounds work even before music starts */
let sfxCtx = null;
function getSfxCtx() {
  if (!sfxCtx || sfxCtx.state === 'closed') {
    sfxCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (sfxCtx.state === 'suspended') sfxCtx.resume();
  return sfxCtx;
}

function playClick() {
  try {
    const ctx = getSfxCtx();
    const now = ctx.currentTime;
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.06, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.008));
    }
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.28, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
    const hp = ctx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 1800;
    src.connect(hp); hp.connect(g); g.connect(ctx.destination);
    src.start(now);
  } catch(e) {}
}

function playTypeSound() {
  try {
    const ctx = getSfxCtx();
    const now = ctx.currentTime;
    const freq = 2200 + (Math.random() - 0.5) * 600;
    const dur = 0.022;
    const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * dur), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const t = i / ctx.sampleRate;
      d[i] = Math.sin(2 * Math.PI * freq * t) * Math.exp(-t / 0.006)
           + (Math.random() * 2 - 1) * 0.3 * Math.exp(-t / 0.003);
    }
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.07, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    src.connect(g); g.connect(ctx.destination);
    src.start(now);
  } catch(e) {}
}

function createReverb(ctx) {
  const conv = ctx.createConvolver();
  const len = ctx.sampleRate * 3.5;
  const buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.2);
    }
  }
  conv.buffer = buf;
  return conv;
}

function createPad(freq, detune, type) {
  const ctx = audioCtx;
  const osc = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const gainNode = ctx.createGain();
  const filter = ctx.createBiquadFilter();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  osc.detune.value = detune || 0;
  osc2.type = 'triangle';
  osc2.frequency.value = freq * 1.002;
  osc2.detune.value = (detune || 0) + 7;
  filter.type = 'lowpass';
  filter.frequency.value = 900;
  filter.Q.value = 0.8;
  const lfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();
  lfo.frequency.value = 0.08 + Math.random() * 0.04;
  lfoGain.gain.value = 6;
  lfo.connect(lfoGain);
  lfoGain.connect(osc.detune);
  lfo.start();
  osc.connect(gainNode);
  osc2.connect(gainNode);
  gainNode.connect(filter);
  gainNode.gain.setValueAtTime(0, ctx.currentTime);
  gainNode.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 3.5);
  filter.connect(masterGain);
  osc.start();
  osc2.start();
  musicNodes.push(osc, osc2, lfo);
  return gainNode;
}

function createDrone(freq) {
  const ctx = audioCtx;
  const osc = ctx.createOscillator();
  const gainNode = ctx.createGain();
  const filter = ctx.createBiquadFilter();
  osc.type = 'sawtooth';
  osc.frequency.value = freq;
  filter.type = 'lowpass';
  filter.frequency.value = 300;
  filter.Q.value = 2;
  const lfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();
  lfo.frequency.value = 0.03;
  lfoGain.gain.value = freq * 0.002;
  lfo.connect(lfoGain);
  lfoGain.connect(osc.frequency);
  lfo.start();
  osc.connect(gainNode);
  gainNode.connect(filter);
  filter.connect(masterGain);
  gainNode.gain.setValueAtTime(0, ctx.currentTime);
  gainNode.gain.linearRampToValueAtTime(0.04, ctx.currentTime + 5);
  osc.start();
  musicNodes.push(osc, lfo);
}

function scheduleArpNote(freq, startTime, dur) {
  const ctx = audioCtx;
  const osc = ctx.createOscillator();
  const gainNode = ctx.createGain();
  const filter = ctx.createBiquadFilter();
  osc.type = 'triangle';
  osc.frequency.value = freq;
  filter.type = 'bandpass';
  filter.frequency.value = freq * 2;
  filter.Q.value = 1.5;
  osc.connect(gainNode);
  gainNode.connect(filter);
  filter.connect(masterGain);
  gainNode.gain.setValueAtTime(0, startTime);
  gainNode.gain.linearRampToValueAtTime(0.055, startTime + 0.08);
  gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + dur);
  osc.start(startTime);
  osc.stop(startTime + dur + 0.1);
}

function startArpLoop() {
  if (!musicPlaying) return;
  const ctx = audioCtx;
  const now = ctx.currentTime;
  const scale = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88];
  const pattern = [0, 2, 4, 6, 4, 2, 1, 3];
  const stepDur = 60 / 38 / 2;
  pattern.forEach((deg, i) => {
    const octMult = i < 4 ? 0.5 : 1;
    scheduleArpNote(scale[deg % scale.length] * octMult, now + i * stepDur, stepDur * 1.6);
  });
  const t = setTimeout(startArpLoop, pattern.length * stepDur * 1000);
  padTimeouts.push(t);
}

function startMusic() {
  if (musicPlaying) return;
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  musicPlaying = true;
  const reverb = createReverb(audioCtx);
  reverb.connect(audioCtx.destination);
  const reverbGain = audioCtx.createGain();
  reverbGain.gain.value = 0.45;
  reverbGain.connect(reverb);
  masterGain.connect(reverbGain);
  masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
  masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.72, audioCtx.currentTime + 4);
  createPad(130.81, 0, 'sine');
  createPad(196.00, -5, 'sine');
  createPad(246.94, 8, 'triangle');
  createPad(164.81, 3, 'sine');
  createDrone(65.41);
  const t = setTimeout(startArpLoop, 3000);
  padTimeouts.push(t);
}

function stopMusic() {
  if (!musicPlaying) return;
  musicPlaying = false;
  padTimeouts.forEach(t => clearTimeout(t));
  padTimeouts = [];
  if (masterGain) {
    masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    masterGain.gain.setValueAtTime(masterGain.gain.value, audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
  }
  setTimeout(() => {
    musicNodes.forEach(n => { try { n.stop(); } catch(e){} });
    musicNodes = [];
    if (audioCtx) { audioCtx.close(); audioCtx = null; masterGain = null; }
  }, 1600);
}

refreshI18n();
