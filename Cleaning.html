<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cleaning System</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  overflow:hidden;
  font-family:Tahoma, Arial, sans-serif;
  background:#8ed8ff;
  height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  touch-action:none;
}

body::before{
  content:"";

  position:fixed;
  inset:0;

  background:
    radial-gradient(circle at 20% 10%, rgba(255,255,255,0.9), transparent 25%),
    radial-gradient(circle at 80% 20%, rgba(255,255,255,0.5), transparent 20%),
    radial-gradient(circle at 50% 100%, rgba(255,255,255,0.25), transparent 40%);

  pointer-events:none;
}

#loadingScreen{
  position:fixed;
  inset:0;

  display:flex;
  align-items:center;
  justify-content:center;

  background:rgba(120,190,255,0.16);

  backdrop-filter:blur(20px);

  z-index:5000;
}

.loadingPanel{
  width:340px;

  padding:24px;

  border-radius:28px;

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,0.42),
      rgba(255,255,255,0.16)
    );

  border:1px solid rgba(255,255,255,0.5);

  box-shadow:
    0 0 40px rgba(180,240,255,0.35),
    inset 0 1px 5px rgba(255,255,255,0.7);

  color:white;
}

.loadingTitle{
  font-size:24px;
  letter-spacing:3px;

  margin-bottom:20px;

  text-shadow:
    0 0 15px rgba(255,255,255,0.7);
}

.loadingBar{
  width:100%;
  height:18px;

  border-radius:999px;

  overflow:hidden;

  background:rgba(255,255,255,0.14);

  border:1px solid rgba(255,255,255,0.35);
}

#loadingFill{
  width:0%;
  height:100%;

  background:
    linear-gradient(
      90deg,
      #dfffff,
      white,
      #b4f3ff
    );

  transition:0.2s;
}

#loadingText{
  margin-top:14px;

  opacity:0.82;

  font-size:14px;
}

#startButton{
  margin-top:22px;

  width:100%;

  padding:14px;

  border:none;
  border-radius:18px;

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,0.55),
      rgba(255,255,255,0.22)
    );

  color:white;

  font-size:16px;
  letter-spacing:2px;

  box-shadow:
    0 0 20px rgba(255,255,255,0.35);

  display:none;
}

.bg{
  position:fixed;
  inset:0;

  background:
    radial-gradient(circle at top,#dfffff 0%,#8acbff 40%,#5d9fff 100%);

  filter:blur(12px);
  transform:scale(1.1);
}

.window{
  position:relative;
  width:600px;
  max-width:90vw;

  padding:25px;

  border-radius:28px;

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,0.45),
      rgba(255,255,255,0.14)
    );

  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);

  border:1px solid rgba(255,255,255,0.55);

  box-shadow:
    0 0 60px rgba(170,240,255,0.45),
    0 0 120px rgba(255,255,255,0.15),
    inset 0 1px 4px rgba(255,255,255,0.8),
    inset 0 -10px 30px rgba(0,120,255,0.15);

  color:white;

  overflow:hidden;
}

.window::before{
  content:"";

  position:absolute;
  inset:0;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,0.35),
      transparent 30%,
      transparent 70%,
      rgba(255,255,255,0.12)
    );

  pointer-events:none;
}

#assistantBubble{
  position:fixed;
  left:-320px;
  top:32px;

  width:260px;

  padding:14px;

  border-radius:24px;

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,0.38),
      rgba(255,255,255,0.14)
    );

  border:1px solid rgba(255,255,255,0.5);

  backdrop-filter:blur(20px);

  box-shadow:
    0 0 30px rgba(180,240,255,0.35),
    inset 0 1px 5px rgba(255,255,255,0.7);

  color:white;

  z-index:999;

  opacity:0;

  pointer-events:none;
}

.assistantHeader{
  font-size:12px;
  letter-spacing:2px;

  opacity:0.7;

  margin-bottom:8px;
}

.assistantText{
  font-size:15px;
  line-height:1.5;

  text-shadow:0 0 10px rgba(255,255,255,0.4);
}

@keyframes slideMessage{
  0%{
    transform:translateX(0);
    opacity:0;
  }

  10%{
    transform:translateX(360px);
    opacity:1;
  }

  75%{
    transform:translateX(360px);
    opacity:1;
  }

  100%{
    transform:translateX(760px);
    opacity:0;
  }
}

  to{
    transform:translateX(0);
    opacity:1;
  }
}

.topbar{
  display:flex;
  align-items:center;
  gap:8px;

  margin-bottom:16px;

  padding-bottom:12px;

  border-bottom:1px solid rgba(255,255,255,0.2);
}

.dot{
  width:14px;
  height:14px;
  border-radius:50%;

  background:
    radial-gradient(circle at 30% 30%, white, #9fe8ff);

  box-shadow:
    0 0 10px rgba(255,255,255,0.8);
}

h1{
  margin:0;
  font-size:30px;
  letter-spacing:3px;

  text-shadow:
    0 0 10px rgba(255,255,255,0.9),
    0 0 24px rgba(180,240,255,0.6);
}

.desc{
  opacity:0.8;
  margin-top:8px;
}

#cleanArea{
  position:relative;

  margin-top:20px;
  width:100%;
  height:320px;

  border-radius:22px;

  overflow:hidden;

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,0.35),
      rgba(120,200,255,0.08)
    );

  border:1px solid rgba(255,255,255,0.4);

  box-shadow:
    inset 0 0 30px rgba(255,255,255,0.15),
    0 0 30px rgba(170,240,255,0.15);
}

#cleanArea::before{
  content:"";

  position:absolute;
  inset:0;

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,0.3),
      transparent 40%
    );

  pointer-events:none;
}

#message{
  position:absolute;
  inset:0;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:28px;
  letter-spacing:4px;

  opacity:0.15;

  pointer-events:none;
}

.dirt{
  position:absolute;

  width:85px;
  height:85px;

  border-radius:40% 60% 55% 45%;

  background:
    radial-gradient(
      rgba(40,40,40,0.42),
      rgba(20,20,20,0.2) 70%,
      transparent
    );

  filter:blur(7px);

  opacity:1;

  transition:
    opacity 0.18s,
    transform 0.18s;
}

.cleanEffect{
  position:absolute;

  width:90px;
  height:90px;

  border-radius:50%;

  background:
    radial-gradient(
      rgba(255,255,255,0.34),
      rgba(255,255,255,0.12) 45%,
      transparent 75%
    );

  mix-blend-mode:screen;

  pointer-events:none;

  opacity:0.9;

  animation:fade 0.35s linear forwards;

  will-change:transform, opacity;
}

@keyframes fade{
  from{
    opacity:1;
    transform:scale(0.7);
  }

  to{
    opacity:0;
    transform:scale(1.4);
  }
}

.popup{
  position:absolute;
  top:20px;
  right:20px;

  padding:14px 18px;

  border-radius:20px;

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,0.4),
      rgba(255,255,255,0.15)
    );

  border:1px solid rgba(255,255,255,0.5);

  backdrop-filter:blur(16px);

  box-shadow:
    0 0 30px rgba(180,240,255,0.4),
    inset 0 1px 6px rgba(255,255,255,0.6);

  animation:popupAnim 0.4s ease;
}

@keyframes popupAnim{
  from{
    transform:translateY(-20px);
    opacity:0;
  }

  to{
    transform:translateY(0);
    opacity:1;
  }
}

.progressBox{
  margin-top:18px;
}

.progressText{
  margin-bottom:8px;
  opacity:0.85;
}

.progressBar{
  width:100%;
  height:16px;

  border-radius:999px;

  overflow:hidden;

  background:rgba(255,255,255,0.12);

  border:1px solid rgba(255,255,255,0.25);

  box-shadow:
    inset 0 0 12px rgba(255,255,255,0.15);
}

.progressFill{
  width:0%;
  height:100%;

  background:
    linear-gradient(
      90deg,
      #dfffff,
      #ffffff,
      #b7f1ff
    );

  box-shadow:
    0 0 20px rgba(255,255,255,0.9);

  transition:0.2s;
}
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="loadingPanel">
    <div class="loadingTitle">SYSTEM INITIALIZING</div>

    <div class="loadingBar">
      <div id="loadingFill"></div>
    </div>

    <div id="loadingText">Loading environmental assets...</div>

    <button id="startButton">START WORK</button>
  </div>
</div>

<div class="bg"></div>

<div id="assistantBubble">
  <div class="assistantHeader">SYSTEM TASK MANAGER</div>
  <div class="assistantText" id="assistantText">
    Surface contamination detected.<br>
    Please begin cleaning procedure.
  </div>
</div>

<div class="window">

  <div class="topbar">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <h1>CLEANING SYSTEM</h1>

  <div id="cleanArea">
    <div id="message">PLEASE CLEAN</div>
  </div>

  <div class="progressBox">
    <div class="progressText">Cleaning Progress</div>

    <div class="progressBar">
      <div class="progressFill" id="progressFill"></div>
    </div>
  </div>

</div>

<script>
const cleanArea = document.getElementById('cleanArea');
const loadingFill = document.getElementById('loadingFill');
const loadingText = document.getElementById('loadingText');
const startButton = document.getElementById('startButton');
const loadingScreen = document.getElementById('loadingScreen');
const progressFill = document.getElementById('progressFill');
const assistantText = document.getElementById('assistantText');
const assistantBubble = document.getElementById('assistantBubble');

const bgm = new Audio();
const pling = new Audio();

bgm.src = 'https://met-lu.vercel.app/OMORI%20OST%20-%20006%20Let%27s%20Get%20Together%20Now!%20-%20OMOCAT.mp3';
pling.src = 'https://met-lu.vercel.app/Pling%20Sound.mp3';

bgm.loop = true;
bgm.volume = 0.45;
bgm.preload = 'auto';

pling.volume = 0.55;

let musicStarted = false;

async function unlockAudio(){
  if(musicStarted) return;

  try{
    await bgm.play();
    musicStarted = true;
  }
  catch(err){
    console.log(err);
  }
}

const loadingMessages = [
  'Loading environmental assets...',
  'Restoring glass reflections...',
  'Preparing contamination system...',
  'Initializing task manager...',
  'Synchronizing audio systems...'
];

let loadingProgress = 0;

const loadingInterval = setInterval(()=>{

  loadingProgress += Math.random()*18;

  if(loadingProgress > 100){
    loadingProgress = 100;
  }

  loadingFill.style.width = loadingProgress + '%';

  loadingText.innerHTML = loadingMessages[
    Math.floor(Math.random()*loadingMessages.length)
  ];

  if(loadingProgress >= 100){

    clearInterval(loadingInterval);

    loadingText.innerHTML = 'System ready.';

    startButton.style.display = 'block';
  }

},320);

startButton.addEventListener('click', async ()=>{

  await unlockAudio();

  loadingScreen.style.transition = '0.7s';
  loadingScreen.style.opacity = '0';
  loadingScreen.style.pointerEvents = 'none';

  setTimeout(()=>{
    loadingScreen.remove();
  },700);

});

let cleaned = 0;
const total = 45;
const CLEAN_REQUIRED = 45;

const dirtList = [];

for(let i=0;i<total;i++){

  const dirt = document.createElement('div');
  dirt.className = 'dirt';

  dirt.style.left = Math.random()*90 + '%';
  dirt.style.top = Math.random()*85 + '%';

  dirt.dataset.cleaned = 'no';
  dirt.dataset.power = '0';

  cleanArea.appendChild(dirt);
  dirtList.push(dirt);
}

let lastEffectTime = 0;

function createEffect(x,y){

  const now = performance.now();

  if(now - lastEffectTime < 10) return;

  lastEffectTime = now;

  const effect = document.createElement('div');
  effect.className = 'cleanEffect';

  effect.style.left = (x - 45) + 'px';
  effect.style.top = (y - 45) + 'px';

  cleanArea.appendChild(effect);

  setTimeout(()=>{
    effect.remove();
  },350);
}

function cleanAtPosition(clientX, clientY){

  const rect = cleanArea.getBoundingClientRect();

  const x = clientX - rect.left;
  const y = clientY - rect.top;

  dirtList.forEach((dirt)=>{

    if(dirt.dataset.cleaned === 'yes') return;

    const dirtRect = dirt.getBoundingClientRect();

    const dirtX = dirtRect.left - rect.left + dirtRect.width/2;
    const dirtY = dirtRect.top - rect.top + dirtRect.height/2;

    const distance = Math.hypot(x - dirtX, y - dirtY);

    if(distance < 70){

      let power = Number(dirt.dataset.power);

      power += 0.45;

      dirt.dataset.power = power;

      const remain = 1 - (power / CLEAN_REQUIRED);

      dirt.style.opacity = Math.max(remain,0);
      dirt.style.transform = `scale(${1 + power*0.01})`;

      createEffect(x,y);

      if(power >= CLEAN_REQUIRED){

        dirt.dataset.cleaned = 'yes';

        dirt.style.opacity = '0';

        cleaned++;

        const percent = (cleaned / total) * 100;
        progressFill.style.width = percent + '%';

        navigator.vibrate?.(10);

        if(cleaned >= total){
          completeCleaning();
        }
      }
    }
  });
}

let touching = false;

cleanArea.addEventListener('touchstart',(e)=>{

  touching = true;

  const touch = e.touches[0];

  cleanAtPosition(touch.clientX, touch.clientY);

},{ passive:true });

cleanArea.addEventListener('touchmove',(e)=>{

  e.preventDefault();

  if(!touching) return;

  const touch = e.touches[0];

  cleanAtPosition(touch.clientX, touch.clientY);

},{ passive:false });

cleanArea.addEventListener('touchend',()=>{
  touching = false;
});

const randomMessages = [
  'Moisture levels stabilizing...',
  'Cleaning quality acceptable.',
  'Surface glare restored.',
  'Additional contamination detected.',
  'System visuals improving.',
  'Please continue wiping motion.',
  'Glass transparency increasing.',
  'Environmental comfort restored.'
];

function showAssistantMessage(text){

  assistantText.innerHTML = text;

  assistantBubble.style.animation = 'none';
  void assistantBubble.offsetWidth;

  assistantBubble.style.animation = 'slideMessage 6s ease forwards';

  pling.currentTime = 0;
  pling.play().catch(()=>{});
}

setInterval(()=>{

  if(cleaned >= total) return;

  const randomText = randomMessages[
    Math.floor(Math.random()*randomMessages.length)
  ];

  showAssistantMessage(randomText);

},9000);

showAssistantMessage(`
  Surface contamination detected.<br>
  Please begin cleaning procedure.
`);

let currentTask = 1;

function completeCleaning(){

  const popup = document.createElement('div');
  popup.className = 'popup';

  popup.innerHTML = `
    ✨ TASK COMPLETE<br>
    Surface Successfully Cleaned
  `;

  document.querySelector('.window').appendChild(popup);

  navigator.vibrate?.(100);

  setTimeout(()=>{

    currentTask++;

    popup.remove();

    showAssistantMessage(`
      Previous cleaning process complete.<br>
      Loading next contaminated area...<br><br>
      TASK ${currentTask} READY.
    `);

    generateNextTask();

  },2200);
}

function generateNextTask(){

  cleaned = 0;

  progressFill.style.width = '0%';

  dirtList.forEach((dirt)=>{

    dirt.dataset.cleaned = 'no';
    dirt.dataset.power = '0';

    dirt.style.opacity = '1';
    dirt.style.transform = 'scale(1)';

    dirt.style.left = Math.random()*90 + '%';
    dirt.style.top = Math.random()*85 + '%';
  });
}
</script>

</body>
</html>
