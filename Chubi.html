<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>초_절정귀요미천사짱.exe</title>

<style>
* {
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

img, video {
  -webkit-user-drag: none;
  pointer-events: none;
}

body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: black;
}

/* 🌸 배경 */
.bg {
  position: fixed;
  inset: 0;
  z-index: -2;

  background-color: #ffd6ec;
  background-image:
    linear-gradient(45deg, #ffb6d9 25%, transparent 25%),
    linear-gradient(-45deg, #ffb6d9 25%, transparent 25%);
  background-size: 40px 40px;

  transition: filter 1s ease;
}

.bg.dark {
  filter: brightness(0.55);
}

.bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background: url('https://met-lu.vercel.app/842f06f2ee3222050b256152ecba7a18.jpg') center/cover;
  opacity: 0;
  transition: opacity 1s ease;
}

.bg.dark::after {
  opacity: 0.65;
}

/* 💬 채팅 */
#chatLayer {
  position: fixed;
  inset: 0;
  z-index: 5;
  pointer-events: none;
  overflow: hidden;
  display: none; /* 🔥 시작 시 숨김 */
}

.comment {
  position: absolute;
  white-space: nowrap;
  color: white;
  font-family: "MS PGothic", sans-serif;

  font-size: 24px; /* 🔥 더 크게 */

  text-shadow: 0 0 5px black, 1px 1px 0 black;
  animation: move 6s linear forwards;
}

@keyframes move {
  from { transform: translateX(110vw); }
  to { transform: translateX(-120vw); }
}

/* 🪟 윈도우 */
.window {
  width: 900px;
  max-width: 95%;
  margin: auto;
  position: relative;
  top: 50%;
  transform: translateY(-50%);

  background: #d9d9d9;
  border: 3px solid white;
  box-shadow: 0 0 0 2px black, 6px 6px 0 black;
  z-index: 10;
}

/* 타이틀 */
.titlebar {
  background: linear-gradient(#ff69b4, #ff1493);
  color: white;
  font-size: 16px; /* 🔥 증가 */
  padding: 6px 10px;
  font-family: "MS PGothic";
  display: flex;
  justify-content: space-between;
}

/* 내용 */
.content {
  padding: 12px;
  text-align: center;
}

/* 텍스트 */
.title {
  color: white;
  font-family: "MS PGothic";
  font-size: 20px; /* 🔥 증가 */
  text-shadow: 0 0 5px white, 1px 1px 0 black;
}

/* GIF */
.pet-gif {
  width: 230px; /* 🔥 증가 */
  transition: 0.6s;
}

.pet-gif.active {
  filter: saturate(3) brightness(1.4);
}

/* 플레이어 */
.player {
  width: 100%;
  aspect-ratio: 16/9;
  background: black;
  position: relative;
  border: 2px inset white;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 썸네일 */
.overlay {
  position: absolute;
  inset: 0;
  background: url('https://met-lu.vercel.app/hXWvr559Yxo3EKWV7kVruCsgNCraF9s4GwgfMwFaJDlCsG9p03TL1S2fA9sjgA682oWrflQJgqbHIs9PUNlRpBag563guQW28CL725YBAXet-Q6QsI7xIvUNd1GVjEaaVJE4ORtuuPxOAiScilUtVg.webp') center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
}

.play {
  background: white;
  padding: 8px 12px;
  border: 1px solid black;
  font-size: 14px; /* 🔥 증가 */
}

/* 📱 모바일 */
@media (max-width: 600px) {

  .window {
    width: 96%;
    transform: translateY(-50%) scale(1.3);
  }

  .comment {
    font-size: 26px;
  }

  .title {
    font-size: 22px;
  }

  .pet-gif {
    width: 260px;
  }

  .titlebar {
    font-size: 18px;
  }
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div id="chatLayer"></div>

<div class="window">

  <div class="titlebar">
    <span>超_絶頂級귀요미천사짱.exe</span>
    <span>× □</span>
  </div>

  <div class="content">

    <div class="title">超絶最かわてんしちゃん♡</div>

    <img src="https://met-lu.vercel.app/icon_7.gif" class="pet-gif" id="gif">

    <div class="player">
      <video id="video"
        src="https://met-lu.vercel.app/lv_0_20260424073954.mp4">
      </video>

      <div class="overlay" id="overlay">
        <div class="play">▶ 再生</div>
      </div>
    </div>

  </div>
</div>

<script>
const video = document.getElementById("video");
const overlay = document.getElementById("overlay");
const bg = document.getElementById("bg");
const gif = document.getElementById("gif");
const chatLayer = document.getElementById("chatLayer");

/* 💚 긍정 */
const positive = [
"かわいいwww","ダイスキww","がんばれ!","私たちの天使!!","うわっ!",
"最高すぎる","癒される","尊い…","神か？","泣いた",
"エモい","優勝","神動画","ずっと見てたい","ありがとう世界"
];

/* 💀 악플 */
const negative = [
"お前の存在そのものがこの空間を壊している。見ていて不快とかいうレベルじゃない。",
"何を表現したいのか全く伝わらないし自己満足にしか見えない。",
"感覚がズレすぎている。",
"見ていて精神的に削られる。",
"意味がわからないまま終わった。",
"ニコニコ風なのに良さがない。",
"これを出してるのが怖い。",
"正直きつい。"
];

/* 💬 생성 (팝업 회피) */
function spawn(list){
  const c = document.createElement("div");
  c.className = "comment";
  c.innerText = list[Math.floor(Math.random()*list.length)];

  let top;
  do {
    top = Math.random() * 100;
  } while (top > 30 && top < 75);

  c.style.top = top + "%";

  chatLayer.appendChild(c);
  setTimeout(()=>c.remove(),6000);
}

/* 🔁 채팅 시작은 "영상 재생 후" */
let chatStarted = false;

function startChat(){
  if(chatStarted) return;
  chatStarted = true;

  chatLayer.style.display = "block"; // 🔥 등장
  setInterval(()=>{
    const t = video.currentTime;

    if(t>=12 && t<=22){
      spawn(negative);
    } else {
      spawn(positive);
    }
  },160);
}

/* ▶ 재생 */
overlay.onclick = ()=>{
  overlay.style.display="none";
  video.play();
  startChat(); // 🔥 여기서 시작
};

/* 🌑 연출 */
video.addEventListener("timeupdate",()=>{
  const t = video.currentTime;

  if(t>=12 && t<=22){
    bg.classList.add("dark");
    gif.classList.add("active");
  } else {
    bg.classList.remove("dark");
    gif.classList.remove("active");
  }
});

/* 🔄 종료 */
video.addEventListener("ended",()=>{
  location.reload();
});

/* 🚫 보호 */
document.addEventListener("contextmenu",e=>e.preventDefault());
</script>

</body>
</html>
